<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Crocodile</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f0f0f0; }
        model-viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <model-viewer 
        src="building.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        ar-placement="floor"
        shadow-intensity="1.5"
        shadow-softness="0.5"
        environment-image="neutral">
        
        <button slot="ar-button" style="background-color: #007bff; color: white; border: none; padding: 14px 28px; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); border-radius: 30px; font-size: 16px; font-weight: bold; font-family: sans-serif; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 999;">
            📸 Τοποθέτησε τον Κροκόδειλο στο Χώρο
        </button>
        
    </model-viewer>

</body>
</html>
